<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikmin Bloom活動入口</title>
  
  <!-- 載入 Noto Sans TC 才有真正的 900 字重 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      background: url("pikmin.jpg") center center / cover no-repeat;
      background-color: rgba(15, 25, 35, 0.75);
      background-blend-mode: multiply;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container { 
      text-align: center; 
      max-width: 500px; 
    }
    
    h1 { 
      font-size: 42px; 
      color: #ffcb05; /* 皮卡丘黃 */
      margin-bottom: 20px; 
      font-weight: 900;
      text-shadow: 3px 3px 0 #1a4d8f; /* 寶可夢藍描邊，讓黃字更清楚 */
    }
    
    /* 段落：寶可夢藍 + 粗體 */
    p { 
      font-size: 18px; 
      color: #2a75bb; 
      font-weight: bold; 
      margin-bottom: 30px; 
    }
    
    .btn {
      background: #ffcb05; 
      color: #2a75bb; 
      padding: 18px 50px;
      text-decoration: none; 
      border-radius: 8px; 
      font-size: 22px;
      font-weight: bold; 
      display: inline-block; 
      transition: 0.2s;
      box-shadow: 0 4px 0 #d4a904; /* 按鈕立體感 */
    }
    
    .btn:hover { 
      transform: scale(1.05); 
      box-shadow: 0 6px 0 #d4a904;
    }
    
    .btn:active {
      transform: scale(1.02);
      box-shadow: 0 2px 0 #d4a904;
    }
    
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #ffcb05;
      margin-bottom: 20px;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="avatar" src="logo.jpg" alt="頭貼">
    <h1>Pikmin Bloom</h1>
    <p>領取入口</p>
    <a class="btn" href="https://lin.ee/Z2eEesq">立即領取序號</a>
  </div>
</body>
</html>
